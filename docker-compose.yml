# ── Shared environment blocks (YAML anchors) ─────────────────────────────────
# All variables are read from .env — change DB_NAME, passwords, ports, etc. there.
x-db-env: &db-env
  DATABASE_URL: postgres://${DB_LEAD_SVC_USER}:${DB_LEAD_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_TENANT: postgres://${DB_TENANT_SVC_USER}:${DB_TENANT_SVC_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}
  DATABASE_URL_SERVICE: postgres://${DB_SERVICE_USER}:${DB_SERVICE_PASSWORD}@${DB_CONTAINER_NAME}:5432/${DB_NAME}

services:
  postgres:
    image: postgres:18.4
    container_name: ${DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/postgresql
      - ./db_scripts/01_init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${AUTH_SERVICE_PORT}
      <<: *db-env
      ACTIVITIES_SERVICE_URL: http://activities-service:${ACTIVITIES_SERVICE_PORT}
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  users-service:
    build:
      context: .
      dockerfile: services/users-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${USERS_SERVICE_PORT}
      <<: *db-env
      ACTIVITIES_SERVICE_URL: http://activities-service:${ACTIVITIES_SERVICE_PORT}
    ports:
      - "${USERS_SERVICE_PORT}:${USERS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  leads-service:
    build:
      context: .
      dockerfile: services/leads-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${LEADS_SERVICE_PORT}
      <<: *db-env
      ACTIVITIES_SERVICE_URL: http://activities-service:${ACTIVITIES_SERVICE_PORT}
      META_SERVICE_URL: http://meta-conversion-api:${META_SERVICE_PORT}
    ports:
      - "${LEADS_SERVICE_PORT}:${LEADS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  assignments-service:
    build:
      context: .
      dockerfile: services/assignments-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${ASSIGNMENTS_SERVICE_PORT}
      <<: *db-env
      ACTIVITIES_SERVICE_URL: http://activities-service:${ACTIVITIES_SERVICE_PORT}
    ports:
      - "${ASSIGNMENTS_SERVICE_PORT}:${ASSIGNMENTS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${ANALYTICS_SERVICE_PORT}
      <<: *db-env
    ports:
      - "${ANALYTICS_SERVICE_PORT}:${ANALYTICS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  activities-service:
    build:
      context: .
      dockerfile: services/activities-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${ACTIVITIES_SERVICE_PORT}
      <<: *db-env
    ports:
      - "${ACTIVITIES_SERVICE_PORT}:${ACTIVITIES_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  notifications-service:
    build:
      context: .
      dockerfile: services/notifications-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${NOTIFICATIONS_SERVICE_PORT}
      <<: *db-env
    ports:
      - "${NOTIFICATIONS_SERVICE_PORT}:${NOTIFICATIONS_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  communication-service:
    build:
      context: .
      dockerfile: services/communication-service/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${COMMUNICATION_SERVICE_PORT}
    ports:
      - "${COMMUNICATION_SERVICE_PORT}:${COMMUNICATION_SERVICE_PORT}"

  meta-conversion-api:
    build:
      context: .
      dockerfile: services/meta-conversion-api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${META_SERVICE_PORT}
      <<: *db-env
    ports:
      - "${META_SERVICE_PORT}:${META_SERVICE_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${GATEWAY_PORT}
      <<: *db-env
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT}
      USERS_SERVICE_URL: http://users-service:${USERS_SERVICE_PORT}
      LEADS_SERVICE_URL: http://leads-service:${LEADS_SERVICE_PORT}
      ASSIGNMENTS_SERVICE_URL: http://assignments-service:${ASSIGNMENTS_SERVICE_PORT}
      ANALYTICS_SERVICE_URL: http://analytics-service:${ANALYTICS_SERVICE_PORT}
      ACTIVITIES_SERVICE_URL: http://activities-service:${ACTIVITIES_SERVICE_PORT}
      META_SERVICE_URL: http://meta-conversion-api:${META_SERVICE_PORT}
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:${NOTIFICATIONS_SERVICE_PORT}
      COMMUNICATION_SERVICE_URL: http://communication-service:${COMMUNICATION_SERVICE_PORT}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      users-service:
        condition: service_started
      leads-service:
        condition: service_started
      assignments-service:
        condition: service_started
      analytics-service:
        condition: service_started
      activities-service:
        condition: service_started
      meta-conversion-api:
        condition: service_started
      notifications-service:
        condition: service_started
      communication-service:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_PORT}
        API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_PORT}
      API_GATEWAY_INTERNAL_URL: http://api-gateway:${GATEWAY_PORT}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
